s3:
  endpoint_url: ${S3_ENDPOINT_URL:-http://minio:9000}
  access_key: ${S3_ACCESS_KEY:-minioadmin}
  secret_key: ${S3_SECRET_KEY:-minioadmin}
  raw_bucket: ${S3_BUCKET_RAW:-bird-raw-frames}
  training_bucket: ${S3_BUCKET_TRAINING:-bird-training-data}

postgres:
  host: ${POSTGRES_HOST:-postgres}
  port: ${POSTGRES_PORT:-5432}
  database: ${POSTGRES_DB:-birdcatalog}
  user: ${POSTGRES_USER:-bird}
  password: ${POSTGRES_PASSWORD:-bird_secret}

analytics:
  confidence_threshold: 0.7
  min_samples_for_retrain: 500
  low_confidence_threshold: 0.5

spark:
  app_name: bird-batch-pipeline
  master: local[*]
