services:
  # ── Database ──────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: birdcatalog
      POSTGRES_USER: bird
      POSTGRES_PASSWORD: bird_secret
    volumes:
      - /mnt/raid0/birdcam/postgres:/var/lib/postgresql/data
    ports:
      - "5430:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bird -d birdcatalog"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Model Serving ─────────────────────────────────────
  torchserve:
    build:
      context: ./serving
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
      - "8083:8081"
    volumes:
      - ./serving/model_store:/home/model-server/model-store
      - /mnt/raid0/birdcam/logs/torchserve:/home/model-server/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Catalog API (eBird validation + storage) ──────────
  catalog:
    build:
      context: .
      dockerfile: catalog/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - /mnt/raid0/birdcam/logs/catalog:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  # ── Inference Worker ──────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: pipeline/worker/Dockerfile
    depends_on:
      torchserve:
        condition: service_healthy
      catalog:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - /mnt/raid0/birdcam/logs/worker:/app/logs
    environment:
      TORCHSERVE_URL: http://torchserve:8080
      CATALOG_URL: http://catalog:8000
    restart: unless-stopped
