global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "torchserve"
    static_configs:
      - targets: ["torchserve:8082"]

  - job_name: "fastapi"
    static_configs:
      - targets: ["catalog:8000"]
    metrics_path: /metrics

  - job_name: "flink"
    static_configs:
      - targets: ["flink-jobmanager:8081"]
    metrics_path: /metrics
