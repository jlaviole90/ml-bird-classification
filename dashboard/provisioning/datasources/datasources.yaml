apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: birdcatalog
    user: bird
    secureJsonData:
      password: bird_secret
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: bird-detections
    jsonData:
      esVersion: "8.0.0"
      timeField: detected_at
    editable: false
