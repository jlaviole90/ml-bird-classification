name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: birdcatalog
          POSTGRES_USER: bird
          POSTGRES_PASSWORD: bird_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --cov --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://bird:bird_secret@localhost:5432/birdcatalog
          DATABASE_URL_SYNC: postgresql://bird:bird_secret@localhost:5432/birdcatalog
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  build-images:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - { name: catalog, context: ".", dockerfile: catalog/Dockerfile }
          - { name: serving, context: "./serving", dockerfile: serving/Dockerfile }
          - { name: extractor, context: ".", dockerfile: pipeline/ingestion/Dockerfile }
          - { name: worker, context: ".", dockerfile: pipeline/worker/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: bird-classification/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
