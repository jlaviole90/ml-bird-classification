server {
    listen 8080;
    server_name _;

    # HLS stream
    location / {
        root /var/www/hls;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin *;
    }

    # Catalog API proxy -- exposes detections, frames, videos, yard list, etc.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large responses for video and frame batch uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50m;

        # CORS for jlav.io
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check pass-through
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # Prometheus metrics (not exposed publicly, but useful for internal checks)
    location = /metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
    }
}
