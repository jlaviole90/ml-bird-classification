limit_req_zone $binary_remote_addr zone=video_limit:1m rate=2r/m;

map $http_origin $cors_origin {
    default "";
    "https://jlav.io" "https://jlav.io";
    ~^http://localhost(:[0-9]+)?$ $http_origin;
    ~^http://127\.0\.0\.1(:[0-9]+)?$ $http_origin;
}

server {
    listen 8080;
    server_name _;

    # ── HLS stream ───────────────────────────────────────
    location / {
        root /var/www/hls;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin $cors_origin;
    }

    # ── Catalog API (read-only) ──────────────────────────
    location /api/ {
        # Block all write methods -- internal services use port 8000 directly
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 1k;

        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        add_header Vary "Origin";

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    # ── Video endpoint: rate-limited (2 req/min per IP) ──
    location ~ ^/api/v1/detections/[^/]+/video$ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        limit_req zone=video_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Vary "Origin";
    }

    # ── Block Swagger/ReDoc/OpenAPI (internal only) ──────
    location = /docs { return 404; }
    location = /redoc { return 404; }
    location = /openapi.json { return 404; }

    # ── Health check (read-only, no sensitive data) ──────
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # ── Block metrics from public access ─────────────────
    location = /metrics { return 404; }
}
