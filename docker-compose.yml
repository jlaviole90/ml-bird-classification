services:
  # ── Database ──────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: birdcatalog
      POSTGRES_USER: bird
      POSTGRES_PASSWORD: bird_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bird -d birdcatalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Model Serving ─────────────────────────────────────
  torchserve:
    build:
      context: ./serving
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./serving/model_store:/home/model-server/model-store
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Catalog API ──────────────────────────────────────
  catalog:
    build:
      context: .
      dockerfile: catalog/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Inference Worker ──────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: pipeline/worker/Dockerfile
    depends_on:
      torchserve:
        condition: service_healthy
      catalog:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TORCHSERVE_URL: http://torchserve:8080
      CATALOG_URL: http://catalog:8000
    restart: unless-stopped

volumes:
  postgres-data:
